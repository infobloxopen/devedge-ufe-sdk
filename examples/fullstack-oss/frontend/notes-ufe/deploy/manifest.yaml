# Minimal deploy manifest for the Notes-ufe uFE static bundle.
# The BASE scaffold ships this plain Deployment + Service; any product-specific
# deploy chart comes from a private preset overlay, not here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-ufe-ufe
  labels:
    app.kubernetes.io/name: notes-ufe-ufe
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: notes-ufe-ufe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notes-ufe-ufe
    spec:
      containers:
        - name: notes-ufe-ufe
          image: notes-ufe-ufe:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: notes-ufe-ufe
spec:
  selector:
    app.kubernetes.io/name: notes-ufe-ufe
  ports:
    - port: 80
      targetPort: 80
