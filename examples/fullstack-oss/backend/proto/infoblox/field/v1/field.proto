// github.com/infobloxopen/apis/proto/infoblox/field/v1/field.proto
// (released via apx). This copy exists solely so buf can resolve the import
// when generating test fixtures. Keep byte-identical to the canonical file.
syntax = "proto3";

package infoblox.field.v1;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/infobloxopen/apis/proto/infoblox/field/v1;fieldv1";

// FieldOptions declares field-level data-modeling properties: sensitivity,
// storage constraints, and relationships. This is intentionally separate from
// the authz package — secret fields and ORM associations are data concerns,
// not authorization concerns.
message FieldOptions {
  // secret marks a field as sensitive. The framework will:
  //   - never store the plaintext value (hash + optional cipher only),
  //   - redact the value in logs ("[REDACTED]"),
  //   - reject any Get/List response that returns a non-empty value.
  bool secret = 1;

  // Storage constraints.
  bool   not_null    = 2;  // DB NOT NULL constraint
  bool   unique      = 3;  // DB UNIQUE constraint / uniqueIndex
  bool   index       = 4;  // DB index (non-unique)
  string column_name = 5;  // override the default snake_case column name
  string column_type = 6;  // override the DB column type (e.g. "varchar(255)")

  // Identity. Declare on a resource's id field to control how the primary
  // identifier is produced. When absent, the id field is treated as
  // SERVER_GENERATED with the UUID7 generator: the framework mints a fresh id
  // on Create if the caller leaves it empty, and honors a caller-supplied id.
  IdOptions id = 7;

  // unique_with lists sibling field names whose columns join this field's
  // unique index, forming a composite "unique within a parent" constraint.
  // Requires unique = true. The tenant column (account_id, when present) still
  // leads the composite automatically, so
  // {unique: true, unique_with: ["cart_id"]} on a cart item's sku yields a
  // unique index over (account_id, cart_id, sku). Each name must be a scalar
  // field on the same message.
  repeated string unique_with = 8;

  // allowed_values constrains a string field to a fixed set of values (a
  // string-backed enum). The generated Create and Update handlers reject a
  // non-empty value outside the set with InvalidArgument before persistence.
  // An empty list imposes no constraint; an empty field value is treated as
  // unset and is not checked (use not_null to require a value).
  repeated string allowed_values = 9;

  // Relationships. Declare on the proto field that holds the related resource.
  // The codegen plugins generate the appropriate ORM association or graph edge.
  HasOne     has_one      = 20;
  HasMany    has_many     = 21;
  BelongsTo  belongs_to   = 22;
  ManyToMany many_to_many = 23;
}

// HasOne declares a one-to-one relationship where the foreign key lives on the
// associated model's table. Annotate the message-typed field that holds the
// associated resource (e.g. User.CreditCard where credit_cards.user_id is the FK).
message HasOne {
  // foreign_key is the column name on the associated table.
  string foreign_key = 1;
  // association_foreign_key is the column on this table (default: primary key).
  string association_foreign_key = 2;
}

// HasMany declares a one-to-many relationship where the FK is on the
// associated table. Annotate the repeated message-typed field.
message HasMany {
  string foreign_key             = 1;
  string association_foreign_key = 2;
  // position_field enables ordered has_many (e.g. for ranked items).
  string position_field          = 3;
}

// BelongsTo declares the inverse side of a has_one or has_many: the FK lives
// on this table. Annotate the message-typed field that holds the parent.
message BelongsTo {
  // foreign_key is the column on THIS table (e.g. "user_id" on orders).
  string foreign_key             = 1;
  string association_foreign_key = 2;
}

// ManyToMany declares a many-to-many relationship via an explicit join table.
message ManyToMany {
  // join_table is the name of the join table.
  string join_table = 1;
  // foreign_key is this model's FK column in the join table.
  string foreign_key = 2;
  // association_foreign_key is the other model's FK column in the join table.
  string association_foreign_key = 3;
}

// IdOptions controls how a resource's primary identifier is produced. Declare it
// on the resource's id field. Server-generated identity (the default) lets a
// caller omit the id so the framework mints one; an empty id is never persisted.
message IdOptions {
  // Strategy selects who supplies the identifier.
  enum Strategy {
    STRATEGY_UNSPECIFIED      = 0;  // treated as STRATEGY_SERVER_GENERATED
    STRATEGY_SERVER_GENERATED = 1;  // framework mints the id when the caller omits it
    STRATEGY_USER_SETTABLE    = 2;  // caller must supply the id (AIP-133 user-specified ids)
  }
  // Generator selects the identifier format used for STRATEGY_SERVER_GENERATED.
  enum Generator {
    GENERATOR_UNSPECIFIED = 0;  // treated as GENERATOR_UUID7
    GENERATOR_UUID7       = 1;  // time-ordered UUID (default; index-friendly)
    GENERATOR_UUID4       = 2;  // random UUID
    GENERATOR_CUSTOM      = 3;  // use the host-registered IDGenerator
  }
  Strategy  strategy  = 1;
  Generator generator = 2;
}

extend google.protobuf.FieldOptions {
  // opts carries all field-level data-modeling properties.
  // Extension number 50003 (alongside method-level rule = 50001 in authz).
  FieldOptions opts = 50003;
}
