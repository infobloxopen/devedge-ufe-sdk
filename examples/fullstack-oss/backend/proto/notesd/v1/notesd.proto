syntax = "proto3";

// NoteService (Note resource), scaffolded by `devedge-sdk new service`.
//
// This is the PUBLIC, apx-governed API surface. It carries only engine-neutral
// annotations ((infoblox.authz.v1.rule), (infoblox.field.v1.opts)) — no ORM or
// engine options ever appear here (enforced by `apx policy check`). The GORM
// models and repository are generated from this proto by `buf generate` and are
// git-ignored, consumer-local code (see .gitignore).
package notesd.v1;

option go_package = "github.com/example/notesd/gen/notesdv1;notesdv1";

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "infoblox/authz/v1/authz.proto";
import "infoblox/field/v1/field.proto";

// Note is the resource managed by Notesd.
message Note {
  option (google.api.resource) = {
    type: "notesd.v1/Note"
    pattern: "notes/{note}"
  };

  // name is the AIP-122 resource name, e.g. "notes/abc123".
  string name        = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  string id          = 2;
  // account_id scopes the resource to a tenant; the repository filters every
  // query by it (set from the request's tenant context — see server/main.go).
  string account_id  = 3;
  // display_name is a human-friendly label; indexed for lookup.
  string display_name = 4 [(infoblox.field.v1.opts) = {index: true}];
  string description  = 5;
  // AIP-154 ETag: framework-managed; stamped on every write, surfaced on read.
  string etag         = 6 [(google.api.field_behavior) = OUTPUT_ONLY];
  // AIP-148: soft-delete timestamp; set by Delete, cleared by Undelete.
  google.protobuf.Timestamp delete_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// NoteService is a CRUD service over Note. EVERY rpc carries an
// (infoblox.authz.v1.rule): the server asserts at boot that all methods are
// declared, and refuses to start if any is missing (fail-closed authz gate).
service NoteService {
  rpc CreateNote(CreateNoteRequest) returns (Note) {
    option (google.api.http) = {post: "/v1/notes", body: "note"};
    option (infoblox.authz.v1.rule) = {verb: "create", resource: "notes"};
  }
  rpc GetNote(GetNoteRequest) returns (Note) {
    option (google.api.http) = {get: "/v1/notes/{id}"};
    option (infoblox.authz.v1.rule) = {verb: "read", resource: "notes"};
  }
  rpc ListNotes(ListNotesRequest) returns (ListNotesResponse) {
    option (google.api.http) = {get: "/v1/notes"};
    option (infoblox.authz.v1.rule) = {verb: "read", resource: "notes"};
  }
  rpc UpdateNote(UpdateNoteRequest) returns (Note) {
    option (google.api.http) = {patch: "/v1/notes/{note.id}", body: "note"};
    option (infoblox.authz.v1.rule) = {verb: "update", resource: "notes"};
  }
  rpc DeleteNote(DeleteNoteRequest) returns (DeleteNoteResponse) {
    option (google.api.http) = {delete: "/v1/notes/{id}"};
    option (infoblox.authz.v1.rule) = {verb: "delete", resource: "notes"};
  }
}

message CreateNoteRequest { Note note = 1; }
message GetNoteRequest {
  string id = 1;
  // AIP-157: fields to return; empty means all fields.
  google.protobuf.FieldMask read_mask = 2;
}
message ListNotesRequest {
  int32  page_size    = 1;
  string page_token   = 2;
  // AIP-148: include soft-deleted resources when true.
  bool   show_deleted = 3;
}
message ListNotesResponse {
  repeated Note notes = 1;
  string next_page_token = 2;
}
message UpdateNoteRequest {
  Note    note = 1;
  repeated string update_mask = 2;
}
message DeleteNoteRequest  { string id = 1; }
message DeleteNoteResponse {}
