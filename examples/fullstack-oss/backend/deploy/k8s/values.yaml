# Thin values overlay for notesd — the ONLY chart input you author. Wraps
# the framework chart (deploy/k8s/helmrelease.yaml) with this service's specifics.
# Apply it as a ConfigMap named notesd-values (valuesKey values.yaml) that
# the HelmRelease references, e.g.:
#   kubectl create configmap notesd-values -n notesd \
#     --from-file=values.yaml=deploy/k8s/values.yaml --dry-run=client -o yaml | kubectl apply -f -
image:
  # Published by .github/workflows/image.yml to GHCR on merge to main (and v* tags).
  repository: ghcr.io/example/notesd
  tag: ""   # published tags: latest, <branch>, sha-<short>, and <version> on a v* tag.
            # Empty defaults to the chart appVersion; pin a tag here for a release.

config:
  # The config.ServerOptions env prefix this service loads with (config.Env).
  envPrefix: "NOTESD_"
  grpcAddr: ":9090"
  httpAddr: ":8080"
  logLevel: info

service:
  grpcPort: 9090
  httpPort: 8080

otel:
  exporter:
    otlp:
      # Point at your collector to activate tracing/metrics export (#90). Empty
      # no-ops cleanly.
      endpoint: ""   # e.g. otel-collector.observability:4317
      protocol: grpc

dsn:
  # Postgres-backed: provision the DSN out of band (Vault/ExternalSecrets) and
  # reference it here so the connection string never lands in git.
  existingSecret: "notesd-dsn"
  secretKey: dsn

ingress:
  enabled: false
  # host: notesd.example.com

# Graceful shutdown window — keep paired with the service's signal.NotifyContext
# shutdown and the chart default.
terminationGracePeriodSeconds: 30
