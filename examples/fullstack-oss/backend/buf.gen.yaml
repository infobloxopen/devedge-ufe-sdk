version: v2
# GORM backend: six SDK `local:` plugins. Output lands under gen/notesd/v1
# (git-ignored, consumer-local). All take `module=github.com/example/notesd/gen`; protoc-gen-storage
# additionally takes `dialect=sqlite` (the smoke test runs on SQLite). The ent
# plugin is intentionally excluded on the gorm path.
#
# The SDK plugins (protoc-gen-{devedge-authz,svc,storage}) must be on PATH for buf;
# `make generate` installs them pinned to the SDK version. The public plugins
# (protoc-gen-{go,go-grpc,grpc-gateway}) come from your toolchain (also installed
# by `make tools`).
inputs:
  - directory: proto
    paths:
      - proto/notesd/v1/notesd.proto
plugins:
  - local: protoc-gen-go
    out: gen
    opt: module=github.com/example/notesd/gen
  - local: protoc-gen-go-grpc
    out: gen
    opt: module=github.com/example/notesd/gen
  - local: protoc-gen-devedge-authz
    out: gen
    opt: module=github.com/example/notesd/gen
  - local: protoc-gen-svc
    out: gen
    opt: module=github.com/example/notesd/gen
  - local: protoc-gen-storage
    out: gen
    opt:
      - module=github.com/example/notesd/gen
      - dialect=sqlite
  - local: protoc-gen-grpc-gateway
    out: gen
    opt: module=github.com/example/notesd/gen
  - local: protoc-gen-openapiv2
    out: openapi
    opt: output_format=json,allow_merge=true,merge_file_name=notesd
