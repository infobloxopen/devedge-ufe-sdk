name: image

# Build and publish the Notesd container image to GitHub Container Registry
# on merge to main (and on v* tags) — using ko, so there is NO Dockerfile in this
# repo. ko compiles the Go binary CGO-free and lays it on a distroless STATIC base
# (KO_DEFAULTBASEIMAGE below), multi-arch. The image is repo-namespaced and
# NON-NESTED: ghcr.io/<owner>/<repo>.
#
# gen/ is git-ignored, so — exactly like ci.yml — the consumer-local code is
# generated BEFORE the build (`make bootstrap` = tools + generate).
#
# This template is rendered with square-bracket delimiters so GitHub Actions'
# ${{ ... }} passes through verbatim.

on:
  push:
    branches: ["main"]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # One image per binary. A single-binary service publishes NON-NESTED at
        # ghcr.io/<owner>/<repo> (empty suffix). For an additional binary, add a row
        # with a "-<name>" suffix — still non-nested, e.g.
        # `{ binary: worker, suffix: "-worker" }` -> ghcr.io/<owner>/<repo>-worker.
        # ko --bare publishes EXACTLY KO_DOCKER_REPO, and builds ./cmd/<binary>.
        include:
          - binary: "notesd"
            suffix: ""
    env:
      # Repo-namespaced, non-nested target. `ko build --bare` publishes EXACTLY this.
      KO_DOCKER_REPO: ghcr.io/${{ github.repository }}${{ matrix.suffix }}
      # Distroless + STATIC runtime base (ko builds CGO-free Go by default, so the
      # binary is the whole payload).
      KO_DEFAULTBASEIMAGE: gcr.io/distroless/static-debian12:nonroot
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Install apx
        uses: infobloxopen/apx@main

      # gen/ is git-ignored: install the codegen plugins (pinned to the SDK in
      # go.mod) and generate the consumer-local code ko compiles.
      - name: Generate consumer-local code
        run: make bootstrap

      # ko is installed the same way the scaffold installs its other public tools.
      - name: Install ko
        run: go install github.com/google/ko@latest

      - name: Log in to GHCR
        run: ko login ghcr.io --username "${{ github.actor }}" --password "${{ secrets.GITHUB_TOKEN }}"

      - name: Compute tags
        id: tags
        run: |
          short=$(git rev-parse --short HEAD)
          case "$GITHUB_REF" in
            refs/tags/v*) echo "tags=${GITHUB_REF_NAME#v},sha-$short" >> "$GITHUB_OUTPUT" ;;
            *)            echo "tags=latest,sha-$short" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Build and push (ko — distroless static, multi-arch, no Dockerfile)
        env:
          # Reproducible build: trim build-machine paths from the binary (the binary
          # no longer embeds /home/runner/... — same source builds byte-identically
          # anywhere; debug symbols are kept). ko already defaults to -trimpath; we
          # set it explicitly so the intent is visible and survives a ko default change.
          GOFLAGS: -trimpath
        run: |
          ko build --bare \
            --platform=linux/amd64,linux/arm64 \
            --tags "${{ steps.tags.outputs.tags }}" \
            ./cmd/notesd
