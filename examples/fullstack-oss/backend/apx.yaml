version: 1
org: infobloxopen
repo: notesd

module_roots:
    - proto

language_targets:
    go:
        enabled: true
        plugins:
            - name: protoc-gen-go
              version: v1.64.0
            - name: protoc-gen-go-grpc
              version: v1.5.0

policy:
    forbidden_proto_options:
        - ^gorm\.
    allowed_proto_plugins:
        - protoc-gen-go
        - protoc-gen-go-grpc
    openapi:
        spectral_ruleset: .spectral.yaml
    avro:
        compatibility: BACKWARD
    jsonschema:
        breaking_mode: strict
    parquet:
        allow_additive_nullable_only: true

release:
    tag_format: '{subdir}/v{version}'
    ci_only: true

tools:
    buf:
        version: v1.66.1
    oasdiff:
        version: v1.9.6
    spectral:
        version: v6.11.0
    avrotool:
        version: 1.11.3

execution:
    mode: local
    container_image: ""
