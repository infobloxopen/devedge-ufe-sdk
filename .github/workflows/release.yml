name: Release

# Publishes every SDK package to GitHub Packages (npm.pkg.github.com) on a
# version tag (v*) or manual dispatch. Uses the built-in GITHUB_TOKEN with
# packages:write — NO external secret required.
#
# pnpm rewrites each package's `workspace:*` cross-dependency to the real
# published version at publish time.
#
# Consumers install these scoped packages with an .npmrc:
#   @infobloxopen:registry=https://npm.pkg.github.com
#   //npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}   # any token with read:packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure GitHub Packages auth
        run: |
          {
            echo "@infobloxopen:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter './packages/*' run build

      - name: Publish to GitHub Packages
        run: pnpm -r --filter './packages/*' publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
