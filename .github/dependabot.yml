# Dependabot configuration.
# Routine version updates (grouped, weekly). Security updates are enabled
# separately at the repository level and open PRs for vulnerable dependencies
# automatically regardless of this file.
# Monorepo: "/**" covers root workspace, packages/*, and examples/*.
version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 15
    labels:
      - "dependencies"
      - "javascript"
    groups:
      npm-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "gomod"
    directories:
      - "/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
    groups:
      go-modules:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directories:
      - "/**"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    groups:
      docker:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"
